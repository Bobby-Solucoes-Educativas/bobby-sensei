services:
  db:
    image: ${DOCKERHUB_USER}/bobby-sensei-db:latest
    container_name: sensei-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: ${DOCKERHUB_USER}/bobby-sensei-app:latest
    container_name: sensei-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL}
      CONFLUENCE_EMAIL: ${CONFLUENCE_EMAIL}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN}
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    command: streamlit run src/app.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped

volumes:
  pgdata:
