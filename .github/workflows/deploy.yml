name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: producao

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobby-sensei-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push DB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.db
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobby-sensei-db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy stack no Portainer
        run: |
          STACK_JSON=$(curl -skf -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks")

          STACK_ID=$(echo "$STACK_JSON" | jq -r '.[] | select(.Name == "bobby-sensei") | .Id')
          ENDPOINT_ID=$(echo "$STACK_JSON" | jq -r '.[] | select(.Name == "bobby-sensei") | .EndpointId')

          STACK_FILE=$(curl -skf -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/$STACK_ID/file" | jq '.StackFileContent')

          curl -skf -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -d "{\"stackFileContent\": $STACK_FILE, \"pullImage\": true, \"prune\": false}"
